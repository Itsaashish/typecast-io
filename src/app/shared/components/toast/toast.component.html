<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none">
  <div *ngFor="let toast of toastService.toasts()"
       [ngClass]="{
         'bg-success/90 border-success/30 text-white': toast.type === 'success',
         'bg-warning/90 border-warning/30 text-slate-900': toast.type === 'warning',
         'bg-error/90 border-error/30 text-white': toast.type === 'error',
         'bg-accent/90 border-accent/30 text-white': toast.type === 'info'
       }"
       class="p-4 rounded-lg shadow-lg border backdrop-blur-md flex items-center justify-between gap-3 pointer-events-auto animate-slide-in transition-all duration-300">
    
    <div class="flex items-center gap-2">
      <!-- Success Icon -->
      <svg *ngIf="toast.type === 'success'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      
      <!-- Warning Icon -->
      <svg *ngIf="toast.type === 'warning'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>

      <!-- Error Icon -->
      <svg *ngIf="toast.type === 'error'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>

      <!-- Info Icon -->
      <svg *ngIf="toast.type === 'info'" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>

      <span class="text-sm font-medium">{{ toast.message }}</span>
    </div>

    <button (click)="remove(toast.id)" class="text-current hover:opacity-75 focus:outline-none">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
