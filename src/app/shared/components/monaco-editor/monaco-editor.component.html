<div class="relative w-full h-full min-h-[300px]">
  <div #editorContainer class="absolute inset-0 w-full h-full overflow-hidden"></div>
  <div *ngIf="loading" class="absolute inset-0 flex flex-col items-center justify-center bg-base-200/80 backdrop-blur-xs z-10">
    <span class="loading loading-spinner loading-md text-primary"></span>
    <span class="mt-2 text-xs font-semibold text-base-content/70">Loading editor...</span>
  </div>
</div>
